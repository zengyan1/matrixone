name: CICD
on:
  push:
    branches:
    - main
    paths:
    - 'eks/**'

jobs:
  up:
    runs-on: arm64-runner
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-node@v2
      with:
        node-version: 14.x
    - uses: unfor19/install-aws-cli-action@v1.0.3
      with:
        arch: arm64
    - run: npm install
    - uses: pulumi/actions@v3
      with:
        command: up
        stack-name: ci
        work-dir: eks
      env:
        PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
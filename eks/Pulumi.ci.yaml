config:
  aws:region: us-west-2
  eks:adminUsers:
  - wuyelei
  - wanglei
  - qinshuqi
  - jinqinghui
  - sudong
  - zhanghailong
  - pengzhen
  eks:adminRoles:
  - cicd-aws-role
  eks:workers:
  - name: arm
    instanceType: t4g.large
    # ref: https://docs.aws.amazon.com/eks/latest/userguide/eks-optimized-ami.html
    amiId: ami-0bea0f4e1d10dcca7
    spotPrice: "0.03"
    # 2 for HA
    minSize: 2
    maxSize: 15
    labels:
      arch: arm64
      beta.kubernetes.io/arch: arm64
    azs: 1
  - name: arm-xlarge
    instanceType: t4g.xlarge
    # ref: https://docs.aws.amazon.com/eks/latest/userguide/eks-optimized-ami.html
    amiId: ami-0bea0f4e1d10dcca7
    spotPrice: "0.05"
    minSize: 1
    maxSize: 10
    labels:
      arch: arm64
      beta.kubernetes.io/arch: arm64
    # run arm runners in a single AZ so that the runner would not be interrupted by AZ rebalance
    azs: 1
  - name: x86
    instanceType: t3.medium
    amiId: ami-064d458a449aebcf9
    spotPrice: "0.03"
    minSize: 0
    maxSize: 5
    labels:
      arch: amd64
      beta.kubernetes.io/arch: amd64
    az3: 3
  - name: x86-xlarge
    instanceType: t3.xlarge
    amiId: ami-064d458a449aebcf9
    spotPrice: "0.1"
    minSize: 0
    maxSize: 10
    labels:
      arch: amd64
      beta.kubernetes.io/arch: amd64
    az3: 1

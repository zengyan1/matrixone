name: CICD
on:
  - pull_request

defaults:
  run:
    working-directory: ./cicd
jobs:
  preview:
    name: Preview
    runs-on: arm64-runner
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: 14.x
      - run: npm install
      - uses: pulumi/actions@v3
        with:
          command: preview
          stack-name: aws
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

name: CICD
on:
  - pull_request

jobs:
  preview:
    name: Preview
    runs-on: arm64-runner
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: 14.x
      - run: npm install
        working-directory: ./cicd
      - uses: pulumi/actions@v3
        with:
          command: preview
          stack-name: aws
          work-dir: ./cicd
          comment-on-pr: true
        env:
          # TODO: only configured in `matrixorigin/ops`, we need an org level one
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

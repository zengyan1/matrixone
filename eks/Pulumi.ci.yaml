config:
  aws:region: us-west-2
  eks:userMappings:
  - group: 'system:masters'
    users:
    - wuyelei
    - wanglei
    - qinshuqi
    - jinqinghui
    - zhanghailong
  - group: 'system:developer'
    users:
    - sudong
    - heni
    - tianyahui
    - pengzhen
    - tianfeng
    - wangjian
    - longran
    - liyuesheng
    - yanwenze
    - chenmingsong
    - nitao
    - zhangxu
    - jiangxinmeng
    - xupeng
    - shenjiangwei
    - lichangliang
    - tanboyu
    - xiezexiong
    - hanfeng
    - liubo
  eks:adminRoles:
  - cicd-aws-role
  eks:workers:
  - name: arm
    instanceType: t4g.large
    # ref: https://docs.aws.amazon.com/eks/latest/userguide/eks-optimized-ami.html
    amiId: ami-0bea0f4e1d10dcca7
    spotPrice: "0.03"
    # 2 for HA
    minSize: 2
    maxSize: 10
    labels:
      arch: arm64
      beta.kubernetes.io/arch: arm64
      billing-role: ci
    azs: 1
  - name: arm-xlarge
    instanceType: t4g.xlarge
    # ref: https://docs.aws.amazon.com/eks/latest/userguide/eks-optimized-ami.html
    amiId: ami-0bea0f4e1d10dcca7
    spotPrice: "0.05"
    minSize: 1
    maxSize: 10
    labels:
      arch: arm64
      beta.kubernetes.io/arch: arm64
      billing-role: ci
    # run arm runners in a single AZ so that the runner would not be interrupted by AZ rebalance
    azs: 1
  - name: x86
    instanceType: t3.medium
    amiId: ami-064d458a449aebcf9
    spotPrice: "0.03"
    minSize: 0
    maxSize: 5
    labels:
      arch: amd64
      beta.kubernetes.io/arch: amd64
      billing-role: ci
    azs: 1
  - name: x86-2xlarge
    instanceType: t3.2xlarge
    amiId: ami-064d458a449aebcf9
    spotPrice: "0.2"
    minSize: 0
    maxSize: 10
    rootVolumeSize: 50
    labels:
      arch: amd64
      beta.kubernetes.io/arch: amd64
      billing-role: ci
    azs: 1
  - name: mo-x86
    instanceType: t3.2xlarge
    amiId: ami-064d458a449aebcf9
    spotPrice: "0.2"
    minSize: 0
    maxSize: 20
    rootVolumeSize: 50
    labels:
      role: mo
      billing-role: dev-x86
    azs: 1
  - name: mo-arm
    instanceType: t4g.xlarge
    # ref: https://docs.aws.amazon.com/eks/latest/userguide/eks-optimized-ami.html
    amiId: ami-0bea0f4e1d10dcca7
    spotPrice: "0.05"
    minSize: 0
    maxSize: 20
    rootVolumeSize: 50
    labels:
      role: mo-arm
      billing-role: dev-arm
    azs: 1
    
  - name: benchmark
    instanceType: m5.8xlarge
    amiId: ami-064d458a449aebcf9
    spotPrice: "1.0"
    minSize: 0
    maxSize: 6
    rootVolumeSize: 50
    labels:
      role: benchmark
      billing-role: benchmark
    azs: 1
    
  - name: log-benchmark
    instanceType: c7g.8xlarge
    amiId: ami-0bea0f4e1d10dcca7
    spotPrice: "0.5"
    minSize: 0
    maxSize: 3
    rootVolumeSize: 50
    labels:
      role: log-benchmark
      billing-role: log-benchmark
    azs: 1

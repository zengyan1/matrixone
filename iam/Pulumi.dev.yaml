      Version: '2012-10-17'
      Statement:
      - Sid: S3FullAccess
        Effect: Allow
        Action:
        - 's3:*'
        Resource: '*'
    rolePolicies:
    # Write permissions
    - arn:aws:iam::aws:policy/AmazonS3FullAccess
    # Readonly permissions
    - arn:aws:iam::aws:policy/IAMReadOnlyAccess
  - group: IAMAdmin

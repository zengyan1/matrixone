config:
  aws:region: us-east-1
  iam:awsGroups:
  - group: CloudDev
    users:
    - jinqinghui
    - wanglei
    - wuyelei
    - qinshuqi
    - zhanghailong
    policy:
      Version: '2012-10-17'
      Statement:
      - Sid: EKSFullAccess
        Effect: Allow
        Action:
        - 'eks:*'
        Resource: '*'
      - Sid: AutoScalingFullAccess
        Effect: Allow
        Action:
        - 'autoscaling:*'
        Resource: '*'
      - Sid: ECRFullAccess
        Effect: Allow
        Action:
        - 'ecr:*'
        Resource: '*'
    rolePolicies:
    # Write permissions
    - arn:aws:iam::aws:policy/AmazonEC2FullAccess
    - arn:aws:iam::aws:policy/AmazonVPCFullAccess
    - arn:aws:iam::aws:policy/AmazonSSMFullAccess
    - arn:aws:iam::aws:policy/AWSCloudFormationFullAccess
    - arn:aws:iam::aws:policy/AmazonS3FullAccess
    # Readonly permissions
    - arn:aws:iam::aws:policy/IAMReadOnlyAccess
    - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
    - arn:aws:iam::aws:policy/CloudWatchReadOnlyAccess
  - group: EngineDev
    users:
    - wangjian
    - shenjiangwei
    - liyuesheng
    policy:
      Version: '2012-10-17'
      Statement:
      - Sid: EKSFullAccess
        Effect: Allow
        Action:
        - 'eks:*'
        Resource: '*'
      - Sid: AutoScalingFullAccess
        Effect: Allow
        Action:
        - 'autoscaling:*'
        Resource: '*'
    rolePolicies:
    # Write permissions
    - arn:aws:iam::aws:policy/AmazonEC2FullAccess
    - arn:aws:iam::aws:policy/AmazonVPCFullAccess
    - arn:aws:iam::aws:policy/AmazonSSMFullAccess
    - arn:aws:iam::aws:policy/AWSCloudFormationFullAccess
    - arn:aws:iam::aws:policy/AmazonS3FullAccess
    # Readonly permissions
    - arn:aws:iam::aws:policy/IAMReadOnlyAccess
    - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
    - arn:aws:iam::aws:policy/CloudWatchReadOnlyAccess
    
